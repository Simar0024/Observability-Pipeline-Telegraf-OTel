receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 256

exporters:
  otlp_grpc:
    endpoint: "otel-collector:4317"
    tls:
      insecure: true

  otlp_http/loki:
    endpoint: http://loki:3100/otlp

  file:
    path: /opt/logs/otel-collector.log
    rotation:
      max_megabytes: 10
      max_backups: 3
  debug:
    verbosity: detailed
  
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [file, debug, otlp_grpc, otlp_http/loki]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp_grpc]