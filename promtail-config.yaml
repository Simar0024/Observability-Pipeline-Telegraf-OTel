server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: app_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: web-app
          __path__: /opt/logs/web-app.log

  - job_name: telegraf_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: telegraf
          __path__: /opt/logs/telegraf-metrics.log

  - job_name: otel_collector_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: otel-collector
          __path__: /opt/logs/otel-collector.log