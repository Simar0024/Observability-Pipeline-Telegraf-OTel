global:
  scrape_interval: 3s
  evaluation_interval: 3s

scrape_configs:
  - job_name: 'fastapi-app'
    static_configs:
      - targets: ['web-app:8000']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'telegraf'
    static_configs:
      - targets: ['telegraf:9273']